<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Game Shop</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<img src="images/logo.png" class="logo">

<h1>My Unity Game</h1>

<p>
オリジナルゲーム販売サイト
</p>

</header>



<section class="game">


<h2>🎮 ゲーム紹介</h2>


<img src="images/game.jpg" class="gameImage">


<p>
Unityで制作したアクションゲームです。
</p>


<button onclick="playGame()">
ゲームを開始
</button>


</section>




<section class="member">


<h2>👤 会員管理</h2>


<p>
会員登録すると限定機能が利用できます。
</p>


<button onclick="login()">
ログイン
</button>


<button onclick="registerUser()">
会員登録
</button>


<p id="userStatus">
未ログイン
</p>


</section>




<section class="shop">


<h2>💎 課金アイテムショップ</h2>



<div class="item">


<h3>コイン100個</h3>

<p>価格：120円</p>


<button onclick="buyItem('コイン100個')">

購入する

</button>


</div>




<div class="item">


<h3>プレミアムキャラクター</h3>

<p>価格：500円</p>


<button onclick="buyItem('プレミアムキャラクター')">

購入する

</button>


</div>




<div class="item">


<h3>広告削除</h3>

<p>価格：980円</p>


<button onclick="buyItem('広告削除')">

購入する

</button>


</div>


</section>




<footer>

<p>
©2026 My Game Shop
</p>

</footer>




<script>


function playGame(){

alert("ゲームを起動します");

}



function login(){

document.getElementById("userStatus").innerHTML =
"ログインしました";

}



function registerUser(){

document.getElementById("userStatus").innerHTML =
"会員登録しました";

}



function buyItem(item){

alert(
item + " の購入ページへ移動します"
);

}


</script>



</body>

</html>
