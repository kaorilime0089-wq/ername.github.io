<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Game Service</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<img src="images/logo.png" class="logo" alt="ゲームロゴ">

<h1>My Game Service</h1>

<p>
Unityで制作したオリジナルゲームサービス
</p>

</header>



<section class="game">

<h2>🎮 ゲーム紹介</h2>


<img src="images/game.jpg" class="gameImage" alt="ゲーム画像">


<p>
アクション・FPS・ホラーなどの
オリジナルゲームを提供しています。
</p>


<button onclick="startGame()">
ゲームをプレイ
</button>


</section>




<section class="member">

<h2>👤 会員管理</h2>


<p>
会員登録するとプレミアム機能を利用できます。
</p>


<button onclick="login()">
ログイン
</button>


<button onclick="register()">
会員登録
</button>


</section>




<section class="payment">

<h2>💎 プレミアムサービス</h2>


<p>
月額980円で特別コンテンツを利用できます。
</p>


<button onclick="buy()">
購入する
</button>


</section>




<footer>

<p>
© 2026 My Game Service
</p>

</footer>




<script>


function startGame(){

alert("ゲームを開始します");

}


function login(){

alert("ログイン画面へ移動します");

}


function register(){

alert("会員登録画面へ移動します");

}


function buy(){

alert("決済ページへ移動します");

}


</script>


</body>

</html>
